services:
  - type: web
    name: smbot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        value: smbot.app.mailer@gmail.com
      - key: NODE_ENV
        value: production
    disk:
      name: smbot-data
      mountPath: /var/data
      sizeGB: 1
